    clarification_question: "你说的'厉害'，更偏向哪种感觉？"
    clarification_options:
      - { label: "整体高级感", target_tag: "痛点: 不够高级" }
      - { label: "色彩冲击力", target_tag: "维度: 配色扁平" }
      - { label: "动效抓眼球", target_tag: "维度: 缺动效" }

