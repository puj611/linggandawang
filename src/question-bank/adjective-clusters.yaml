# 灵感大王形容词簇配置 v1
# 用于本地规则引擎：把用户的模糊形容词输入映射到具体的维度标签
# 设计原则：
#   1. 多个 surface_forms（同一含义的不同说法）归为一个 cluster
#   2. 每个 cluster 关联多个 dimension_tags，按 weight 排序表示倾向
#   3. 可选 clarification_question：当 cluster 命中但有多个候选时，动态生成澄清题
#   4. 可选 magnitude：程度词，影响后续规格阶段的数值倾向
schema_version: "1.0"
total_clusters: 0

# ─────────── 视觉感受类 ───────────
clusters:
  # --- 好看/漂亮/舒服（积极正向） ---
  - id: "好看"
    surface_forms: ["好看", "漂亮", "美", "顺眼", "和谐", "舒服", "耐看", "精致"]
    dimension_tags:
      - { tag: "痛点: 视觉丑", weight: 0.9 }
      - { tag: "维度: 配色", weight: 0.5 }
      - { tag: "维度: 留白", weight: 0.4 }
      - { tag: "维度: 对齐错位", weight: 0.3 }
    clarification_question: "你觉得现在哪一点最影响好看？"
    clarification_options:
      - { label: "颜色搭配", target_tag: "维度: 配色" }
      - { label: "整体留白", target_tag: "维度: 留白" }
      - { label: "对齐错位", target_tag: "维度: 对齐错位" }

  # --- 丑/难看（负向核心词） ---
  - id: "丑"
    surface_forms: ["丑", "难看", "土", "low", "廉价", "俗气", "掉档次", "不上台面"]
    dimension_tags:
      - { tag: "痛点: 视觉丑", weight: 1.0 }
      - { tag: "维度: 配色", weight: 0.6 }
      - { tag: "维度: 圆角描边", weight: 0.4 }
      - { tag: "维度: 字体", weight: 0.3 }
      - { tag: "维度: 留白", weight: 0.4 }
    clarification_question: "丑主要体现在哪方面？"
    clarification_options:
      - { label: "颜色搭配", target_tag: "维度: 配色" }
      - { label: "圆角/描边", target_tag: "维度: 圆角描边" }
      - { label: "字体选择", target_tag: "维度: 字体" }
      - { label: "整体留白", target_tag: "维度: 留白" }

  # --- 高级/质感/精致（核心正向） ---
  - id: "高级感"
    surface_forms: ["高级", "高大上", "高端", "大气", "上档次", "有质感", "精致", "轻奢", "考究"]
    dimension_tags:
      - { tag: "痛点: 不够高级", weight: 1.0 }
      - { tag: "维度: 留白不足", weight: 0.6 }
      - { tag: "维度: 对比度不足", weight: 0.5 }
      - { tag: "维度: 缺动效", weight: 0.4 }
      - { tag: "维度: 配色扁平", weight: 0.4 }
    clarification_question: "你说的'高级'，更偏向哪种感觉？"
    clarification_options:
      - { label: "留白更有呼吸感", target_tag: "维度: 留白不足" }
      - { label: "色彩对比更强烈", target_tag: "维度: 对比度不足" }
      - { label: "加入细腻的动效", target_tag: "维度: 缺动效" }
      - { label: "配色更克制专业", target_tag: "维度: 配色扁平" }

  # --- 厉害（程度副词，叠加权重而非直接映射） ---
  - id: "厉害"
    surface_forms: ["厉害", "厉害点", "整厉害点", "牛x", "牛逼", "炸裂", "猛"]
    dimension_tags:
      - { tag: "痛点: 不够高级", weight: 0.8 }
      - { tag: "维度: 缺动效", weight: 0.5 }
      - { tag: "维度: 配色扁平", weight: 0.6 }
