    text: '"不统一"最明显的是哪类？'
    why: "「不统一」可能出现在按钮/间距/配色/圆角，定位到具体类别才能给统一规范"
    type: "single-choice"
    options:
      - label: "按钮长得不一样"
        value: "button"
