      - label: "元素之间空的距离时大时小"
        value: "spacing"
        tags: ["维度: 间距不统一"]
      - label: "颜色用得没规矩"
        value: "color"
        tags: ["维度: 配色不统一"]
      - label: "边角的圆度不一样"
        value: "radius"
        tags: ["维度: 圆角不统一"]
