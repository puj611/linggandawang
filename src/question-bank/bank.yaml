      - label: "温馨亲切（像小红书，暖色+大圆角）"
        value: "warm"
        tags: ["风格方向: 温馨", "维度: 配色", "维度: 圆角描边"]
      - label: "C 端活泼（像抖音/B站，大圆角+色彩丰富）"
        value: "consumer"
        tags: ["风格方向: C端", "维度: 圆角描边", "维度: 配色"]
      - label: "游戏炫酷（像 Steam/Epic，高饱和+强动效）"
        value: "gaming"
        tags: ["风格方向: 游戏", "维度: 配色", "维度: 缺动效"]
      - label: "复古国风（像故宫文创，古典配色+传统字体）"
        value: "retro"
        tags: ["风格方向: 复古", "维度: 配色", "维度: 字体"]
