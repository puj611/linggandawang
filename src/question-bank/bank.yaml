        - { keyword: "未来", extract_tag: "风格方向: 科技感" }
        - { keyword: "赛博", extract_tag: "风格方向: 科技感" }
        - { keyword: "高级", extract_tag: "风格方向: 高级感" }
        - { keyword: "质感", extract_tag: "风格方向: 高级感" }
        - { keyword: "商务", extract_tag: "风格方向: 商务" }
