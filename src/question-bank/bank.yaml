# 灵感大王问题库 v1.1
# 覆盖场景：前端 UI（D3 决策：窄而深）
# 分布：perceive 6 / name 7 / spec 8 / execute 5 / verify 5 = 31 条
# 维护人：寇豆码（PM 许清楚 W1 末交付前先填一版）
# Schema 见 src/question-bank/schema.json
schema_version: "1.0"
bank_id: "frontend-ui-v1"
scene: "frontend-ui"
total_questions: 31

stages:
  - id: perceive
    name: "感知阶段"
    order: 1
  - id: name
    name: "命名阶段"
    order: 2
  - id: spec
    name: "规格阶段"
    order: 3
  - id: execute
    name: "执行阶段"
    order: 4
  - id: verify
    name: "验证阶段"
    order: 5

questions:
  # ───────── perceive 6 条：感知阶段 ─────────
  - id: "p-001"
    stage: perceive
    order: 1
    text: "今天想让页面有什么变化？"
    why: "先确定你的目标类型，让我知道你要修 UI、加细节还是抄特性"
    type: "single-choice"
    options:
      - label: "修一个看不顺眼的地方"
        value: "fix-ui"
        tags: ["场景: 修UI"]
      - label: "给现有功能加个小细节"
        value: "add-detail"
        tags: ["场景: 加细节"]
      - label: "抄一个我喜欢产品的特性"
        value: "copy-feature"
        tags: ["场景: 复制特性"]
    allow_custom: true
    placeholder: "或者用你自己的话说..."
    trigger_tags: []
    jumps:
      - when_answer: "fix-ui"
        next_question_id: "p-002"
      - when_answer: "add-detail"
        next_question_id: "p-003"
      - when_answer: "copy-feature"
        next_question_id: "p-004"
    intent_extraction:
      keywords:
        - { keyword: "挤", extract_tag: "痛点: 间距太挤" }
        - { keyword: "丑", extract_tag: "痛点: 视觉丑" }
        - { keyword: "乱", extract_tag: "痛点: 视觉乱" }
        - { keyword: "看不清", extract_tag: "痛点: 对比度不足" }
        - { keyword: "呆板", extract_tag: "痛点: 缺乏动效" }
        - { keyword: "不统一", extract_tag: "痛点: 风格不一致" }
        - { keyword: "刺眼", extract_tag: "痛点: 配色刺眼" }
    required: true
    quick_mode: true

  - id: "p-002"
    stage: perceive
    order: 2
    text: "最看不顺眼的是哪个区域？"
    why: "定位到具体区域，避免改错地方"
    type: "single-choice"
    options:
      - label: "内容卡片 / 列表 / 表格"
        value: "card-list"
        tags: ["目标: 卡片列表"]
      - label: "顶部导航 / 左侧菜单"
        value: "nav"
        tags: ["目标: 导航"]
      - label: "输入框 / 按钮 / 表单"
        value: "form"
        tags: ["目标: 表单"]
      - label: "整体颜色不好看"
        value: "color"
        tags: ["目标: 配色"]
    allow_custom: true
    placeholder: "或者指一下具体位置..."
    trigger_tags: ["场景: 修UI"]
    jumps: []
    intent_extraction:
      keywords:
        - { keyword: "卡片", extract_tag: "目标: 卡片" }
        - { keyword: "列表", extract_tag: "目标: 列表" }
        - { keyword: "导航", extract_tag: "目标: 导航" }
        - { keyword: "表单", extract_tag: "目标: 表单" }
        - { keyword: "弹窗", extract_tag: "目标: 弹窗" }
    required: true

  - id: "p-003"
    stage: perceive
    order: 3
    text: "想加个什么类型的细节？"
    why: "确定细节类型（微交互/空状态/数据可视化），才能给到对应的实现方案"
    type: "single-choice"
    options:
      - label: "鼠标悬停/点击的小反馈（比如按钮变色、弹一下）"
        value: "micro-interaction"
        tags: ["目标: 微交互"]
      - label: "加载动画 / 空页面提示"
        value: "empty-state"
        tags: ["目标: 空状态"]
      - label: "图表、进度条、小徽章这类装饰"
        value: "data-viz"
        tags: ["目标: 数据可视化"]
    allow_custom: true
    placeholder: "或者描述你想加的感觉..."
    trigger_tags: ["场景: 加细节"]
    jumps: []
    intent_extraction:
      keywords:
        - { keyword: "动效", extract_tag: "目标: 动效" }
        - { keyword: "hover", extract_tag: "目标: hover 反馈" }
        - { keyword: "加载", extract_tag: "目标: 加载态" }
    required: true

  - id: "p-004"
    stage: perceive
    order: 4
    text: "想抄的是哪种感觉？（可以提参考产品名）"
    why: "明确要抄的维度（布局/配色/组件/动效），避免笼统说「像 Linear」导致 AI 自由发挥"
    type: "single-choice"
    options:
      - label: "页面排版/布局（比如三栏、左右分栏）"
        value: "layout"
        tags: ["目标: 布局"]
      - label: "整体配色风格（像 Linear 深色、Notion 浅色那种）"
        value: "color-style"
        tags: ["目标: 配色"]
      - label: "某个组件长什么样（按钮、卡片、弹窗）"
        value: "component"
        tags: ["目标: 组件样式"]
      - label: "动画细节（过渡、弹出效果）"
        value: "motion"
        tags: ["目标: 动效"]
    allow_custom: true
    placeholder: "比如：像 Linear 那样的侧边栏..."
    trigger_tags: ["场景: 复制特性"]
    jumps: []
    intent_extraction:
      keywords:
        - { keyword: "Linear", extract_tag: "参考: Linear" }
        - { keyword: "Vercel", extract_tag: "参考: Vercel" }
        - { keyword: "Raycast", extract_tag: "参考: Raycast" }
        - { keyword: "Notion", extract_tag: "参考: Notion" }
    required: true

  - id: "p-005"
    stage: perceive
    order: 5
    text: "用一句话形容你现在的感觉？"
    why: "用你的原话捕捉痛点关键词，后续问题会基于这些词精准展开"
    type: "open"
    options: []
    allow_custom: true
    placeholder: "比如：看起来太挤了、不够高级、哪里都对不齐..."
    trigger_tags: []
    jumps: []
    intent_extraction:
      keywords:
        - { keyword: "挤", extract_tag: "痛点: 间距太挤" }
        - { keyword: "丑", extract_tag: "痛点: 视觉丑" }
        - { keyword: "乱", extract_tag: "痛点: 视觉乱" }
        - { keyword: "高级", extract_tag: "痛点: 不够高级" }
        - { keyword: "看不清", extract_tag: "痛点: 对比度不足" }
        - { keyword: "呆板", extract_tag: "痛点: 缺乏动效" }
        - { keyword: "不统一", extract_tag: "痛点: 风格不一致" }
        - { keyword: "刺眼", extract_tag: "痛点: 配色刺眼" }
        - { keyword: "对不齐", extract_tag: "痛点: 对齐错位" }
        - { keyword: "层级", extract_tag: "痛点: 层级缺失" }
    required: false

  - id: "p-006"
    stage: perceive
    order: 6
    text: "这次改动影响多大范围？"
    why: "确定改动范围（单组件/单页/全站），影响后续规格和执行方案的粒度"
    type: "single-choice"
    options:
      - label: "就改一个小地方（一个按钮、一张卡片）"
        value: "single"
        tags: ["范围: 单组件"]
      - label: "改一整个页面"
        value: "page"
        tags: ["范围: 单页"]
      - label: "全站统一换风格（所有页面都变）"
        value: "global"
        tags: ["范围: 全局"]
    allow_custom: false
    placeholder: ""
    trigger_tags: []
    jumps: []
    intent_extraction:
      keywords: []
    required: false

  # ───────── name 7 条：命名阶段（把模糊感觉命名成具体维度）─────────
  - id: "n-001"
    stage: name
    order: 1
    text: '你说"乱"，主要是哪种乱？'
    why: "把「乱」翻译成具体维度（信息/视觉/层级），后续才能针对性给规格"
    type: "single-choice"
    options:
      - label: "元素之间空的距离不统一（有的挤有的松）"
        value: "spacing-inconsistent"
        tags: ["维度: 间距不统一"]
      - label: "字大大小小没层次感"
        value: "font-hierarchy"
        tags: ["维度: 字号层级缺失"]
      - label: "颜色太多太花哨"
        value: "color-too-many"
        tags: ["维度: 颜色太多"]
      - label: "文字/元素对不齐"
        value: "alignment"
        tags: ["维度: 对齐错位"]
    allow_custom: true
    placeholder: "或者用你自己的话说..."
    trigger_tags: ["痛点: 视觉乱"]
    trigger_clusters: ["乱", "花哨", "复杂", "整齐"]
    jumps:
      - when_answer: "spacing-inconsistent"
        next_question_id: "s-001"
      - when_answer: "font-hierarchy"
        next_question_id: "s-004"
      - when_answer: "alignment"
        next_question_id: "s-003"
      - when_answer: "color-too-many"
        next_question_id: "s-005"
    intent_extraction: {}
    required: true
    quick_mode: true

  - id: "n-002"
    stage: name
    order: 2
    text: '你说"丑"，最受不了哪方面？'
    why: "把「丑」拆解为配色/圆角/字体/留白等具体维度，才能对症下药"
    type: "single-choice"
    options:
      - label: "颜色搭配不好看"
        value: "color"
        tags: ["维度: 配色"]
      - label: "边角和边框的样子不对"
        value: "radius-border"
        tags: ["维度: 圆角描边"]
      - label: "字体/字的样子不合适"
        value: "font"
        tags: ["维度: 字体"]
      - label: "太挤或太空，留白不对"
        value: "whitespace"
        tags: ["维度: 留白"]
    allow_custom: true
    placeholder: "或者用你自己的话说..."
    trigger_tags: ["痛点: 视觉丑"]
    trigger_clusters: ["丑", "好看", "刺眼", "暗", "单调"]
    jumps:
      - when_answer: "color"
        next_question_id: "s-005"
      - when_answer: "radius-border"
        next_question_id: "s-002"
      - when_answer: "whitespace"
        next_question_id: "s-001"
      - when_answer: "font"
        next_question_id: "s-004"
    intent_extraction: {}
    required: true

  - id: "n-003"
    stage: name
    order: 3
    text: '你说"不够高级"，差在哪一口气？'
    why: "「高级感」是复合概念，需拆解为留白/对比度/动效/配色质感中具体缺哪项"
    type: "single-choice"
    options:
      - label: "内容太满、不够舒展（留白少）"
        value: "whitespace"
        tags: ["维度: 留白不足"]
      - label: "文字和背景反差不够，不清晰"
        value: "contrast"
        tags: ["维度: 对比度不足"]
      - label: "太死板，缺一点动画点缀"
        value: "motion"
        tags: ["维度: 缺动效"]
      - label: "颜色太平淡，没有质感"
        value: "flat-color"
        tags: ["维度: 配色扁平"]
    allow_custom: true
    placeholder: "或者用你自己的话说..."
    trigger_tags: ["痛点: 不够高级"]
    trigger_clusters: ["高级感", "厉害", "惊艳", "专业", "商务", "现代", "极简"]
    jumps:
      - when_answer: "whitespace"
        next_question_id: "s-001"
      - when_answer: "contrast"
        next_question_id: "s-006"
      - when_answer: "motion"
        next_question_id: "n-005"
      - when_answer: "flat-color"
        next_question_id: "s-005"
    intent_extraction: {}
    required: true

  - id: "n-004"
    stage: name
    order: 4
    text: '"看不清"具体是哪种看不清？'
    why: "「看不清」可能是对比度/图标粗细/字号问题，定位到具体原因才能给准确规格"
    type: "single-choice"
    options:
      - label: "文字和背景颜色太接近"
        value: "text-contrast"
        tags: ["维度: 文字对比度低"]
      - label: "图标线条太细"
        value: "icon-thin"
        tags: ["维度: 图标过细"]
      - label: "字太小"
        value: "font-small"
        tags: ["维度: 字号过小"]
    allow_custom: true
    placeholder: "或者用你自己的话说..."
    trigger_tags: ["痛点: 对比度不足"]
    trigger_clusters: ["看不清", "暗", "刺眼", "极简", "商务"]
    jumps:
      - when_answer: "text-contrast"
        next_question_id: "s-006"
      - when_answer: "font-small"
        next_question_id: "s-004"
      - when_answer: "icon-thin"
        next_question_id: "s-003"
    intent_extraction: {}
    required: true

  - id: "n-005"
    stage: name
    order: 5
    text: '"呆板/没灵气"想加点什么？'
    why: "明确动效类型（进出/hover/过渡），不同类型对应不同的 CSS 方案和触发时机"
    type: "single-choice"
    options:
      - label: "元素出现/消失时加点动画"
        value: "enter-exit"
        tags: ["维度: 进出动效"]
      - label: "鼠标悬停时有反应（按钮变色等）"
        value: "hover-feedback"
        tags: ["维度: hover 反馈"]
      - label: "状态切换时的过渡效果"
        value: "transition"
        tags: ["维度: 状态过渡"]
    allow_custom: true
    placeholder: "或者描述你想要的感觉..."
    trigger_tags: ["痛点: 缺乏动效"]
    trigger_clusters: ["呆板", "灵动", "卡顿", "反馈弱", "惊艳", "游戏"]
    jumps: []
    intent_extraction:
      keywords:
        - { keyword: "缓动", extract_tag: "动效: 缓动" }
        - { keyword: "弹性", extract_tag: "动效: 弹性" }
        - { keyword: "fade", extract_tag: "动效: 淡入淡出" }
    required: false

  - id: "n-006"
    stage: name
