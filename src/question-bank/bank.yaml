    placeholder: "或者用你自己的话说..."
    trigger_tags: ["痛点: 风格不一致"]
    trigger_clusters: ["整齐", "商务"]
    jumps:
      - when_answer: "spacing"
        next_question_id: "s-001"
      - when_answer: "color"
        next_question_id: "s-005"
      - when_answer: "radius"
        next_question_id: "s-002"
      - when_answer: "button"
        next_question_id: "s-003"
    intent_extraction: {}
    required: true

  - id: "n-007"
    stage: name
    order: 7
    text: "整体风格想往哪个方向走？"
    why: "锁定风格方向（极简/科技/高级/商务等），后续所有规格都围绕这个方向展开"
    type: "single-choice"
    options:
      - label: "极简克制（像 Apple/Linear，少即是多，大量留白）"
        value: "minimal"
        tags: ["风格方向: 极简", "维度: 留白不足", "维度: 配色"]
      - label: "科技未来（像 Vercel/VS Code，冷色调+锐利边角）"
        value: "tech"
        tags: ["风格方向: 科技感", "维度: 配色", "维度: 圆角描边"]
      - label: "高级质感（像 Stripe/Linear，细腻阴影+强对比）"
        value: "premium"
